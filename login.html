<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f7fc;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-container{
            width:380px;
            margin:80px auto;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .login-container h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#084298;
        }

        #error{
            color:red;
            text-align:center;
            margin-top:15px;
        }

        .back-home{
            text-align:center;
            margin-top:20px;
        }

        .back-home a{
            text-decoration:none;
            color:#0d6efd;
        }
    </style>

</head>

<body>

<div class="login-container">

    <h2>🏥 Hospital Admin Login</h2>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button class="login-btn" onclick="login()">
        Login
    </button>

    <p id="error"></p>

    <div class="back-home">
        <a href="index.html">← Back to Home</a>
    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
