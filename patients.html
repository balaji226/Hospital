<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    width:90%;
    margin:30px auto;
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:20px;
}

.form-box{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:12px 25px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

table th{
    background:#0d6efd;
    color:white;
    padding:12px;
}

table td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}

.delete-btn{
    background:red;
}

.delete-btn:hover{
    background:darkred;
}

</style>

</head>
<body>

<header>
<h2>🏥 Hospital Management System</h2>
</header>

<div class="container">

<h2>Patient Registration</h2>

<div class="form-box">

<input type="text" id="name" placeholder="Patient Name">

<input type="number" id="age" placeholder="Age">

<input type="text" id="gender" placeholder="Gender">

<input type="text" id="disease" placeholder="Disease">

<button onclick="addPatient()">Add Patient</button>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Disease</th>
<th>Action</th>
</tr>

</thead>

<tbody id="patientTable">

</tbody>

</table>

</div>

<script src="js/patient.js"></script>

</body>
</html>
